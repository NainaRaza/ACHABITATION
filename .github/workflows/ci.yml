name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw
      - name: Backend tests
        run: ./mvnw clean test

  backend-postgres-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw
      - name: Backend PostgreSQL integration tests
        env:
          ACHABITATION_POSTGRES_IT: "true"
        run: ./mvnw -Dtest=PostgresIntegrationSmokeTest test

  security-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - name: Make security scan executable
        run: chmod +x ./scripts/security-scan.sh
      - name: Repository security hygiene
        run: ./scripts/security-scan.sh
      - name: Frontend critical dependency audit
        working-directory: frontend-web
        run: npm audit --audit-level=critical

  frontend-smoke-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Make frontend test script executable
        run: chmod +x ./run-tests.sh
      - name: Frontend tests
        run: ./run-tests.sh

  frontend-e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Playwright E2E tests
        run: npm run test:e2e

  android-tests-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Android unit tests
        run: ./gradlew testDebugUnitTest
      - name: Android release API URL guard
        run: ACHABITATION_API_BASE_URL=https://api.example.com/api/v1 ./gradlew checkReleaseApiBaseUrl
      - name: Android debug build
        run: ./gradlew assembleDebug
