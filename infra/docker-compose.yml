services:
  postgres:
    image: postgres:16
    container_name: achabitation-postgres
    environment:
      POSTGRES_DB: achabitation
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER must be set}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
    # Pas de port exposé : PostgreSQL reste uniquement accessible sur le réseau Docker interne.
    volumes:
      - achabitation_pgdata:/var/lib/postgresql/data

  backend:
    build: ../backend-api
    container_name: achabitation-backend-api
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      DATABASE_USER: ${DATABASE_USER:?DATABASE_USER must be set}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
      PORT: ${PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL must be set}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST must be set}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:?SMTP_USERNAME must be set}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD must be set}
      MAIL_FROM: ${MAIL_FROM:?MAIL_FROM must be set}
    ports:
      # Bind local uniquement : en prod, nginx ou un tunnel local doit être le seul point d'entrée public.
      - "127.0.0.1:${PORT:-8080}:8080"

volumes:
  achabitation_pgdata:
