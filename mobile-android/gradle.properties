# Mémoire Gradle : évite les OutOfMemoryError pendant dexing/mergeExtDexDebug.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError

# Le daemon Kotlin a aussi son propre heap.
kotlin.daemon.jvmargs=-Xmx2048m

# Évite de multiplier les workers sur des machines avec peu de RAM disponible.
org.gradle.parallel=false
org.gradle.workers.max=2
org.gradle.caching=true
org.gradle.configuration-cache=true

android.useAndroidX=true
android.nonTransitiveRClass=true
android.nonFinalResIds=false
