spring:
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: false
server:
  port: ${PORT:8080}
achabitation:
  security:
    mode: opaque-access-token
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS}
  auth:
    require-email-verification: true
  app:
    public-url: ${APP_PUBLIC_URL}
  mail:
    enabled: true
    from: ${MAIL_FROM}
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
