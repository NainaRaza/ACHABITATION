spring:
  application:
    name: achabitation-backend-api
  datasource:
    url: jdbc:h2:file:./data/achabitation;AUTO_SERVER=TRUE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
achabitation:
  security:
    mode: opaque-access-token
