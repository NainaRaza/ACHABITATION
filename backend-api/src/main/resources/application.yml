spring:
  application:
    name: achabitation-backend-api
  datasource:
    url: jdbc:h2:file:./data/achabitation;AUTO_SERVER=TRUE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
achabitation:
  security:
    mode: opaque-access-token
  auth:
    cookie:
      secure: false
      same-site: Strict
      max-age-days: 30
    require-email-verification: false
  app:
    public-url: http://localhost:3000
  mail:
    enabled: false
    from: no-reply@achabitation.local
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
